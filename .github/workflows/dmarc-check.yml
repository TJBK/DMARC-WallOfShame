name: Daily DMARC Check

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scripts/check_dmarc.py

      - name: Commit changes
        run: |
          git diff --quiet || (
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add output/non_dmarc.json
            git commit -m "Update DMARC status"
            git push
          )

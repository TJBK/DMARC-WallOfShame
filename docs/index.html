<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DMARC Watch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>DMARC Watch</h1>
  <p class="subtitle">Domains without enforcement (no DMARC or p=none)</p>

  <div class="controls">
    <input type="text" id="search" placeholder="Search company or domain..." />

    <select id="filter">
      <option value="all">All</option>
      <option value="no_dmarc">No DMARC</option>
      <option value="p_none">p=none</option>
    </select>
  </div>

  <div class="stats">
    <div class="card">
      <span id="total"></span>
      <p>Total</p>
    </div>
    <div class="card">
      <span id="no-dmarc-count"></span>
      <p>No DMARC</p>
    </div>
    <div class="card">
      <span id="pnone-count"></span>
      <p>p=none</p>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th data-sort="name">Company ⬍</th>
        <th data-sort="domain">Domain ⬍</th>
        <th data-sort="status">Status ⬍</th>
        <th data-sort="last_checked">Last Checked ⬍</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
